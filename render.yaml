services:
  - type: web
    name: scadenze-manager
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --preload
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: scadenze-db
          property: connectionString

databases:
  - name: scadenze-db
    plan: free
